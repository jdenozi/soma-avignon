services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: soma_wp
      MYSQL_USER: soma
      MYSQL_PASSWORD: somapass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: soma_wp
      WORDPRESS_DB_USER: soma
      WORDPRESS_DB_PASSWORD: somapass
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/soma-avignon:/var/www/html/wp-content/themes/soma-avignon
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soma-avignon.rule=Host(`test.tempo-hub.fr`)"
      - "traefik.http.routers.soma-avignon.entrypoints=websecure"
      - "traefik.http.routers.soma-avignon.tls.certresolver=letsencrypt"
      - "traefik.http.services.soma-avignon.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

volumes:
  db_data:
  wp_data:

networks:
  internal:
  web:
    external: true
