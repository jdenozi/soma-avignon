services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: soma_wp
      MYSQL_USER: soma
      MYSQL_PASSWORD: somapass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: soma_wp
      WORDPRESS_DB_USER: soma
      WORDPRESS_DB_PASSWORD: somapass
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_HOME', 'http://localhost:8090');
        define('WP_SITEURL', 'http://localhost:8090');
    ports:
      - "8090:80"
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/soma-avignon:/var/www/html/wp-content/themes/soma-avignon

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
      UPLOAD_LIMIT: 256M
    ports:
      - "8091:80"

volumes:
  db_data:
  wp_data:
